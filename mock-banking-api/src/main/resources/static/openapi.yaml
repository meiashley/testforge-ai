openapi: 3.0.3
info:
  title: Mock Banking Payment API
  description: |
    A mock financial payment API used as the demo target for **TestForge AI** automated test generation.

    Supports payment creation, retrieval, and full/partial refunds.
    All data is stored in-memory and reset on restart.
  version: 1.0.0
  contact:
    name: TestForge AI
    email: testforge@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8081
    description: Local development

tags:
  - name: Payments
    description: Payment lifecycle operations

paths:
  /api/payments:
    post:
      tags: [Payments]
      summary: Create a payment
      description: Initiates a new payment. Returns COMPLETED immediately (mock behaviour).
      operationId: createPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePaymentRequest'
            examples:
              standard:
                summary: Standard CNY payment
                value:
                  merchantId: merchant-001
                  customerId: customer-abc
                  amount: 128.50
                  currency: CNY
                  description: "Order #ORD-20260430-001"
      responses:
        '201':
          description: Payment created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/payments/{id}:
    get:
      tags: [Payments]
      summary: Get a payment
      description: Retrieves a payment by its unique identifier.
      operationId: getPayment
      parameters:
        - name: id
          in: path
          required: true
          description: Payment ID
          schema:
            type: string
            example: pay_a1b2c3d4e5f6
      responses:
        '200':
          description: Payment found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '404':
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/payments/{id}/refund:
    post:
      tags: [Payments]
      summary: Refund a payment
      description: Issues a full or partial refund for a COMPLETED payment.
      operationId: refundPayment
      parameters:
        - name: id
          in: path
          required: true
          description: Payment ID
          schema:
            type: string
            example: pay_a1b2c3d4e5f6
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
            examples:
              full_refund:
                summary: Full refund
                value:
                  reason: Customer requested cancellation
              partial_refund:
                summary: Partial refund
                value:
                  amount: 50.00
                  reason: Partial order cancellation
      responses:
        '200':
          description: Refund processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
        '400':
          description: Invalid refund amount
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Payment not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Payment is not in a refundable state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    CreatePaymentRequest:
      type: object
      required: [merchantId, customerId, amount, currency]
      properties:
        merchantId:
          type: string
          maxLength: 64
          description: Merchant identifier
          example: merchant-001
        customerId:
          type: string
          maxLength: 64
          description: Customer identifier
          example: customer-abc
        amount:
          type: number
          format: decimal
          minimum: 0.01
          maximum: 999999.99
          description: Payment amount
          example: 128.50
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          description: ISO 4217 currency code
          example: CNY
        description:
          type: string
          maxLength: 255
          description: Optional payment description
          example: "Order #ORD-20260430-001"

    RefundRequest:
      type: object
      required: [reason]
      properties:
        amount:
          type: number
          format: decimal
          minimum: 0.01
          description: Refund amount; if omitted the full payment amount is refunded
          example: 50.00
        reason:
          type: string
          maxLength: 255
          description: Reason for the refund
          example: Customer requested cancellation

    PaymentResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique payment identifier
          example: pay_a1b2c3d4e5f6
        merchantId:
          type: string
          example: merchant-001
        customerId:
          type: string
          example: customer-abc
        amount:
          type: number
          format: decimal
          example: 128.50
        currency:
          type: string
          example: CNY
        status:
          $ref: '#/components/schemas/PaymentStatus'
        description:
          type: string
          example: "Order #ORD-20260430-001"
        refundReason:
          type: string
          nullable: true
          description: Present only when status is REFUNDED or PARTIALLY_REFUNDED
          example: Customer requested cancellation
        createdAt:
          type: string
          format: date-time
          example: "2026-04-30T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-30T10:05:00Z"

    PaymentStatus:
      type: string
      enum: [PENDING, COMPLETED, FAILED, REFUNDED, PARTIALLY_REFUNDED]
      description: |
        - PENDING: payment initiated but not yet processed
        - COMPLETED: payment successfully processed
        - FAILED: payment processing failed
        - REFUNDED: payment fully refunded
        - PARTIALLY_REFUNDED: payment partially refunded

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 400
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: Request validation failed
        errors:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/FieldError'
        timestamp:
          type: string
          format: date-time

    FieldError:
      type: object
      properties:
        field:
          type: string
          example: amount
        message:
          type: string
          example: must be greater than 0
