name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Unit Tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build (skip tests)
        run: mvn install -DskipTests --batch-mode

      - name: Run unit tests
        run: mvn test --batch-mode

      - name: Test summary
        if: always()
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TOTAL_FILES=$(find . -name "TEST-*.xml" 2>/dev/null | wc -l | tr -d ' ')
          echo "Test report files: $TOTAL_FILES" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Tests Run |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----------|" >> $GITHUB_STEP_SUMMARY
          for module in mock-banking-api ai-engine test-runner api-gateway; do
            COUNT=$(find $module -name "TEST-*.xml" 2>/dev/null | wc -l | tr -d ' ')
            echo "| $module | $COUNT test files |" >> $GITHUB_STEP_SUMMARY
          done
